server:
  port: 9091

spring:
  application:
    name: payment-service
  datasource:
    # "postgres-db" isn't a real internet address — it's the name we're about
    # to give the Postgres container in docker-compose.yml. Inside Docker's
    # internal network, containers can find each other by service name.
    url: jdbc:postgresql://postgres-db:5432/${DB_NAME:paygate_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      # Same idea — "eureka-server" will be a container name, not "localhost"
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    org.springframework.web: DEBUG