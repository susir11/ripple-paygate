<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ripple PayGate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>Ripple PayGate</h1>
    <p>Enter an amount to process a payment through the gateway.</p>

    <form id="payment-form">
        <label for="amount">Amount</label>
        <input type="number" id="amount" step="0.01" min="0" required placeholder="e.g. 250.00">
        <button type="submit">Process Payment</button>
    </form>

    <div id="result" class="result hidden"></div>
</div>

<script src="script.js"></script>
</body>
</html>
